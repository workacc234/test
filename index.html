<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My First Cloud App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      margin: 0;
      padding: 0;
    }
    .container {
      margin-top: 100px;
    }
    h1 {
      font-size: 40px;
    }
    p {
      font-size: 18px;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #00c6ff;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #00aaff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 My First Cloud Deployment</h1>
    <p id="message">Click the button below</p>
    <button onclick="changeText()">Click Me</button>
  </div>

  <script>
    function changeText() {
      document.getElementById("message").innerText = "🎉 You are now using the cloud!";
    }
  </script>
</body>
</html>
